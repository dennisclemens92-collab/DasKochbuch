
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Rezept-Box & Planer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Quicksand:wght@300;400;500;600&display=swap');
        
        :root {
            --paper-color: #fcf8f1;
            --accent-color: #8b5a2b;
            --text-color: #4a3728;
            --border-color: #d2b48c;
            --book-shadow: rgba(0, 0, 0, 0.2);
        }

        body {
            background-color: #f4ece1;
            background-image: url("https://www.transparenttextures.com/patterns/felt.png");
            font-family: 'Quicksand', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        h1, h2, h3 { font-family: 'Crimson Pro', serif; }

        .paper-texture {
            background-color: var(--paper-color);
            background-image: url("https://www.transparenttextures.com/patterns/handmade-paper.png");
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(139, 90, 43, 0.1);
        }

        .nav-tab { transition: all 0.3s ease; border-bottom: 4px solid transparent; }
        .nav-tab.active { color: var(--accent-color); border-bottom-color: var(--accent-color); font-weight: bold; }

        .recipe-card {
            border-left: 5px solid var(--accent-color);
            transition: all 0.2s ease;
        }

        .book-wrapper {
            perspective: 1500px;
            width: 100%;
            max-width: 800px;
            height: 70vh;
            position: relative;
            margin: auto;
        }

        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            backface-visibility: hidden;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            border-radius: 24px;
        }

        .page-ingredients { z-index: 2; transform: rotateY(0deg); }
        .page-instructions { z-index: 1; transform: rotateY(180deg); }

        .is-flipped .page-ingredients { transform: rotateY(-180deg); }
        .is-flipped .page-instructions { transform: rotateY(0deg); z-index: 3; }

        .btn-rustikal { background-color: var(--accent-color); color: white; border-radius: 12px; }
        .btn-turn-page { 
            background: #eaddca; 
            border: 2px solid var(--accent-color); 
            color: var(--accent-color); 
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            width: 100%;
            margin-top: 20px;
            border-radius: 16px;
        }

        .status-badge { font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
        .status-offline { background: #fee2e2; color: #991b1b; }
        .status-online { background: #dcfce7; color: #166534; }

        #copyToast {
            transition: opacity 0.3s ease;
        }

        @media (max-width: 640px) {
            .book-wrapper { height: 75vh; }
            .page { padding: 1.5rem !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- LOGIN -->
    <div id="loginOverlay" class="fixed inset-0 bg-[#f4ece1] z-[100] flex items-center justify-center p-4">
        <div class="paper-texture p-8 md:p-12 rounded-3xl max-w-md w-full text-center border-4 border-[#8b5a2b] shadow-2xl">
            <i class="fas fa-utensils text-5xl text-[#8b5a2b] mb-4"></i>
            <h2 class="text-3xl font-bold text-[#5d4037] mb-2">Meine Rezept-Box</h2>
            <p class="text-sm italic mb-6">Bitte gib deinen Sync-Schlüssel ein.</p>
            <input type="text" id="syncKeyInput" class="w-full p-4 rounded-xl border-2 border-[#d2b48c] text-center text-xl font-bold mb-4" placeholder="Schlüssel">
            <button onclick="startAppWithKey()" class="btn-rustikal w-full py-4 text-lg font-bold">Box öffnen</button>
            <div id="syncStatus" class="status-badge status-offline mt-4">Offline</div>
        </div>
    </div>

    <!-- APP CONTENT -->
    <div id="mainApp" class="hidden max-w-6xl mx-auto">
        <nav class="flex justify-center gap-4 md:gap-12 mb-8 border-b border-[#d2b48c] overflow-x-auto pb-1">
            <button onclick="switchTab('recipes')" id="nav-recipes" class="nav-tab py-3 px-2 active flex items-center gap-2"><i class="fas fa-book"></i> Rezepte</button>
            <button onclick="switchTab('plan')" id="nav-plan" class="nav-tab py-3 px-2 flex items-center gap-2"><i class="fas fa-calendar-day"></i> Planer</button>
            <button onclick="switchTab('freezer')" id="nav-freezer" class="nav-tab py-3 px-2 flex items-center gap-2"><i class="fas fa-snowflake"></i> Frost</button>
        </nav>

        <div id="view-recipes" class="tab-view">
            <div class="flex gap-2 mb-6">
                <input type="text" id="searchInput" oninput="renderRecipes()" placeholder="Suche in deinen Schätzen..." class="flex-grow p-4 rounded-2xl border-2 border-[#d2b48c] bg-white/50">
                <button onclick="openModal()" class="btn-rustikal px-6"><i class="fas fa-plus"></i></button>
            </div>
            <div id="filterContainer" class="flex flex-wrap gap-2 mb-6"></div>
            <div id="recipeGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="view-plan" class="tab-view hidden">
            <div id="planGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>

        <div id="view-freezer" class="tab-view hidden">
            <div class="paper-texture p-6 rounded-3xl max-w-2xl mx-auto shadow-lg">
                <div class="flex justify-between items-center mb-6 border-b-2 border-dashed border-[#d2b48c] pb-2">
                    <h2 class="text-2xl font-bold text-[#5d4037]">Tiefkühltruhe</h2>
                    <button onclick="openFreezerModal()" class="text-[#8b5a2b] font-bold text-sm">+ Hinzufügen</button>
                </div>
                <div id="freezerList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- DETAIL MODAL (BUCH) -->
    <div id="detailModal" class="fixed inset-0 bg-black/90 hidden z-[150] flex items-center justify-center p-2 md:p-6 backdrop-blur-md">
        <div class="absolute top-4 right-4 z-[200] flex gap-2">
            <button onclick="closeDetail()" class="bg-white/20 text-white w-12 h-12 rounded-full flex items-center justify-center text-xl"><i class="fas fa-times"></i></button>
        </div>

        <div id="bookWrapper" class="book-wrapper">
            <!-- SEITE 1: EINKAUF -->
            <div class="page page-ingredients paper-texture p-6 md:p-10 flex flex-col">
                <div class="mb-4">
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] uppercase tracking-widest text-[#8b5a2b] font-bold">Seite 1: Einkauf</span>
                        <button onclick="window.copyIngredients()" class="text-[#8b5a2b] text-xs flex items-center gap-1 bg-[#eaddca] px-2 py-1 rounded-md">
                            <i class="fas fa-copy"></i> Kopieren
                        </button>
                    </div>
                    <h2 id="detailTitle" class="text-2xl md:text-3xl font-bold text-[#5d4037]"></h2>
                </div>
                
                <div id="detailImageContainer" class="hidden mb-4">
                    <div class="glued-photo mx-auto"><img id="detailImage" src="" class="max-h-32 rounded"></div>
                </div>

                <div class="flex-grow overflow-y-auto pr-2 relative">
                    <h3 class="font-bold border-b border-[#d2b48c] mb-3 text-[#8b5a2b]">Zutatenliste</h3>
                    <div id="detailIngredients" class="whitespace-pre-line text-sm md:text-base leading-relaxed italic"></div>
                    <div id="copyToast" class="absolute top-0 right-0 bg-[#8b5a2b] text-white text-[10px] px-2 py-1 rounded opacity-0 pointer-events-none">Kopiert!</div>
                </div>

                <button onclick="flipPage(true)" class="btn-turn-page">
                    <span>Umblättern zum Kochen</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>

            <!-- SEITE 2: KOCHEN -->
            <div class="page page-instructions paper-texture p-6 md:p-10 flex flex-col">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <span class="text-[10px] uppercase tracking-widest text-[#8b5a2b] font-bold">Seite 2: Zubereitung</span>
                        <h2 id="detailTitleAlt" class="text-2xl md:text-3xl font-bold text-[#5d4037]"></h2>
                    </div>
                    <div class="flex gap-4">
                        <button id="editBtn" class="text-[#8b5a2b]"><i class="fas fa-pen"></i></button>
                        <button id="deleteRecipeBtn" class="text-red-700"><i class="fas fa-trash"></i></button>
                    </div>
                </div>

                <div class="flex-grow overflow-y-auto pr-2">
                    <h3 class="font-bold border-b border-[#d2b48c] mb-3 text-[#8b5a2b]">Zubereitung</h3>
                    <div id="detailInstructions" class="whitespace-pre-line text-sm md:text-base leading-relaxed"></div>
                </div>

                <button onclick="flipPage(false)" class="btn-turn-page">
                    <i class="fas fa-chevron-left"></i>
                    <span>Zurück zum Einkauf</span>
                </button>
                <button onclick="freezeCurrentRecipe()" class="text-[10px] mt-4 uppercase font-bold text-[#8b5a2b] opacity-40 text-center">In den Tiefkühler legen</button>
            </div>
        </div>
    </div>

    <!-- DIALOGE -->
    <div id="recipeModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-4 z-[160]">
        <div class="paper-texture p-6 rounded-3xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
            <form id="recipeForm" class="space-y-4">
                <input type="hidden" id="editId">
                <input type="text" id="recipeTitle" required class="w-full p-4 rounded-xl border-2 border-[#d2b48c]" placeholder="Titel des Rezeptes">
                <input type="text" id="recipeLabels" class="w-full p-4 rounded-xl border-2 border-[#d2b48c]" placeholder="Kategorien (z.B. Fisch, Schnell)">
                <input type="file" id="recipeImageInput" accept="image/*" class="text-xs">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <textarea id="recipeIngredients" class="w-full p-4 rounded-xl border-2 border-[#d2b48c] h-40" placeholder="Zutaten..."></textarea>
                    <textarea id="recipeInstructions" class="w-full p-4 rounded-xl border-2 border-[#d2b48c] h-40" placeholder="Anleitung..."></textarea>
                </div>
                <div class="flex gap-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 font-bold text-gray-400">Abbrechen</button>
                    <button type="submit" class="flex-1 btn-rustikal py-4 font-bold">Speichern</button>
                </div>
            </form>
        </div>
    </div>

    <div id="planModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-4 z-[160]">
        <div class="paper-texture p-6 rounded-3xl max-w-lg w-full max-h-[85vh] flex flex-col border-4 border-[#8b5a2b]">
            <h3 id="planModalTitle" class="text-2xl font-bold mb-4">Was gibt's zu essen?</h3>
            <input type="text" id="planSearchInput" oninput="window.filterPlanList()" class="w-full p-3 mb-4 rounded-xl border-2 border-[#d2b48c]" placeholder="Suchen...">
            <div class="flex-grow overflow-y-auto space-y-4">
                <div id="planRecipeList"></div>
                <div id="planFreezerList"></div>
            </div>
            <div class="mt-4 pt-4 border-t border-dashed border-[#d2b48c]">
                <input type="text" id="planCustomText" class="w-full p-3 rounded-xl border-2 border-[#d2b48c]" placeholder="Oder Freitext...">
                <div class="flex gap-2 mt-4">
                    <button onclick="closePlanModal()" class="flex-1 py-3 text-gray-500 font-bold">Abbrechen</button>
                    <button onclick="window.savePlanEntry()" class="flex-1 btn-rustikal py-3 font-bold">Planen</button>
                </div>
            </div>
        </div>
    </div>

    <div id="freezerModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-4 z-[160]">
        <div class="paper-texture p-6 rounded-2xl max-w-xs w-full text-center">
            <h3 class="font-bold mb-4">Vorrat hinzufügen</h3>
            <input type="text" id="freezerItemName" class="w-full p-3 mb-2 border-2 rounded-xl" placeholder="Was?">
            <input type="number" id="freezerItemPortions" class="w-full p-3 mb-4 border-2 rounded-xl" value="1">
            <button onclick="window.saveFreezerItem()" class="btn-rustikal w-full py-3 font-bold">Hinzufügen</button>
        </div>
    </div>

    <div id="confirmModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-[250]">
        <div class="paper-texture p-8 rounded-2xl max-w-xs w-full text-center border-2 border-red-700">
            <h3 class="font-bold text-xl mb-4">Sicher löschen?</h3>
            <p id="confirmMessage" class="text-sm mb-8 opacity-60"></p>
            <div class="flex gap-4">
                <button onclick="window.closeConfirm()" class="flex-1 py-2 font-bold text-gray-400">Nein</button>
                <button id="confirmYesBtn" class="flex-1 py-2 bg-red-700 text-white rounded-xl font-bold">Löschen</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const userFirebaseConfig = {
            apiKey: "AIzaSyDQaLCpC_GLGcAPi4PVWQYO55ck38noxeo",
            authDomain: "daskochbuch-21a48.firebaseapp.com",
            projectId: "daskochbuch-21a48",
            storageBucket: "daskochbuch-21a48.firebasestorage.app",
            messagingSenderId: "940507888707",
            appId: "1:940507888707:web:d9afc76fd5272ac08528f6"
        };

        const baseAppId = "daskochbuch-app";
        let db = null, auth = null, user = null;
        let recipes = [], freezer = [], weekPlan = {"Mo":null,"Di":null,"Mi":null,"Do":null,"Fr":null,"Sa":null,"So":null};
        let currentSyncKey = "", currentTab = 'recipes', activeFilter = null, currentImageData = "", currentPlanDay = "", currentRecipeInView = null;
        let confirmAction = null;

        // --- AUTH & SYNC ---
        window.startAppWithKey = async () => {
            const key = document.getElementById('syncKeyInput').value.trim();
            if(!key) return alert("Gib einen Schlüssel ein!");
            currentSyncKey = btoa(key).replace(/=/g, "");
            localStorage.setItem('lastSyncKey', currentSyncKey);
            
            loadFromLocal();
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            const app = initializeApp(userFirebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            
            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user && currentSyncKey) {
                    startSync();
                    const s = document.getElementById('syncStatus');
                    s.innerText = "Cloud Aktiv"; s.className = "status-badge status-online";
                }
            });
            await signInAnonymously(auth);
        };

        const startSync = () => {
            const syncId = currentSyncKey; 
            const appId = baseAppId;

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'recipes_' + syncId), (s) => { 
                recipes = s.docs.map(d => ({ id: d.id, ...d.data() })); 
                saveToLocal(); renderRecipes(); 
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'freezer_' + syncId), (s) => { 
                freezer = s.docs.map(d => ({ id: d.id, ...d.data() })); 
                saveToLocal(); renderFreezer(); 
            });

            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'plans', syncId), (s) => { 
                if (s.exists()) weekPlan = s.data();
                else weekPlan = {"Mo":null,"Di":null,"Mi":null,"Do":null,"Fr":null,"Sa":null,"So":null};
                saveToLocal(); renderPlan(); 
            });
        };

        const loadFromLocal = () => {
            const suffix = currentSyncKey ? '_' + currentSyncKey : '';
            recipes = JSON.parse(localStorage.getItem('rec_cache' + suffix) || '[]');
            freezer = JSON.parse(localStorage.getItem('frz_cache' + suffix) || '[]');
            weekPlan = JSON.parse(localStorage.getItem('pln_cache' + suffix) || '{"Mo":null,"Di":null,"Mi":null,"Do":null,"Fr":null,"Sa":null,"So":null}');
            renderRecipes(); renderPlan(); renderFreezer();
        };

        const saveToLocal = () => {
            const suffix = currentSyncKey ? '_' + currentSyncKey : '';
            localStorage.setItem('rec_cache' + suffix, JSON.stringify(recipes));
            localStorage.setItem('frz_cache' + suffix, JSON.stringify(freezer));
            localStorage.setItem('pln_cache' + suffix, JSON.stringify(weekPlan));
        };

        // --- NAVIGATION ---
        window.switchTab = (t) => {
            currentTab = t;
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + t).classList.remove('hidden');
            document.getElementById('nav-' + t).classList.add('active');
            if(t === 'recipes') renderRecipes();
            else if(t === 'plan') renderPlan();
            else renderFreezer();
        };

        // --- REZEPTE ---
        window.renderRecipes = () => {
            const grid = document.getElementById('recipeGrid');
            const term = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';
            recipes.filter(r => (!activeFilter || r.labels.includes(activeFilter)) && r.title.toLowerCase().includes(term)).forEach(r => {
                const card = document.createElement('div');
                card.className = 'paper-texture recipe-card p-5 rounded-2xl flex flex-col h-full shadow-md cursor-pointer';
                card.onclick = () => window.openDetail(r.id);
                card.innerHTML = `<h3 class="font-bold text-lg mb-2">${r.title}</h3><div class="flex flex-wrap gap-1">${r.labels.map(l => `<span class="bg-[#eaddca] text-[9px] px-2 py-0.5 rounded-full font-bold uppercase text-[#8b5a2b]">${l}</span>`).join('')}</div><div class="mt-auto pt-4 text-[10px] text-[#8b5a2b] uppercase font-bold tracking-widest">Öffnen</div>`;
                grid.appendChild(card);
            });
            renderFilters();
        };

        const renderFilters = () => {
            const container = document.getElementById('filterContainer');
            const labels = [...new Set(recipes.flatMap(r => r.labels))].sort();
            container.innerHTML = `<button onclick="window.setFilter(null)" class="px-4 py-1.5 rounded-full border-2 text-xs font-bold ${!activeFilter ? 'bg-[#8b5a2b] text-white border-[#8b5a2b]' : 'bg-white border-[#d2b48c]'}">Alle</button>`;
            labels.forEach(l => {
                container.innerHTML += `<button onclick="window.setFilter('${l}')" class="px-4 py-1.5 rounded-full border-2 text-xs font-bold ${activeFilter === l ? 'bg-[#8b5a2b] text-white border-[#8b5a2b]' : 'bg-white border-[#d2b48c]'}">${l}</button>`;
            });
        };
        window.setFilter = (l) => { activeFilter = l; renderRecipes(); };

        window.openDetail = (id) => {
            const r = recipes.find(x => x.id === id); 
            if(!r) return;
            currentRecipeInView = r;
            document.getElementById('detailTitle').innerText = r.title;
            document.getElementById('detailTitleAlt').innerText = r.title;
            document.getElementById('detailIngredients').innerText = r.ingredients || "Keine Zutaten";
            document.getElementById('detailInstructions').innerText = r.instructions || "Keine Anleitung";
            const imgC = document.getElementById('detailImageContainer');
            if (r.image) { document.getElementById('detailImage').src = r.image; imgC.classList.remove('hidden'); } 
            else { imgC.classList.add('hidden'); }
            document.getElementById('bookWrapper').classList.remove('is-flipped');
            document.getElementById('detailModal').classList.remove('hidden');
            document.getElementById('editBtn').onclick = () => { window.closeDetail(); window.openModal(r.id); };
            document.getElementById('deleteRecipeBtn').onclick = () => {
                window.showConfirm(`"${r.title}" löschen?`, async () => {
                    if (db && user) await deleteDoc(doc(db, 'artifacts', baseAppId, 'public', 'data', 'recipes_' + currentSyncKey, r.id));
                    else { recipes = recipes.filter(x => x.id !== r.id); saveToLocal(); renderRecipes(); }
                    window.closeDetail();
                });
            };
        };
        window.closeDetail = () => document.getElementById('detailModal').classList.add('hidden');
        window.flipPage = (f) => document.getElementById('bookWrapper').classList.toggle('is-flipped', f);

        window.copyIngredients = () => {
            if (!currentRecipeInView) return;
            const text = `${currentRecipeInView.title} - Einkaufsliste:\n\n${currentRecipeInView.ingredients}`;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                const toast = document.getElementById('copyToast');
                toast.style.opacity = "1";
                setTimeout(() => { toast.style.opacity = "0"; }, 2000);
            } catch (err) {
                console.error('Kopieren fehlgeschlagen', err);
            }
            document.body.removeChild(textArea);
        };

        window.openModal = (id=null) => {
            const form = document.getElementById('recipeForm'); form.reset(); 
            document.getElementById('editId').value = id || '';
            currentImageData = "";
            if(id) {
                const r = recipes.find(x => x.id === id); 
                document.getElementById('recipeTitle').value = r.title; 
                document.getElementById('recipeLabels').value = r.labels.join(', ');
                document.getElementById('recipeIngredients').value = r.ingredients; 
                document.getElementById('recipeInstructions').value = r.instructions;
                currentImageData = r.image || "";
            }
            document.getElementById('recipeModal').classList.remove('hidden');
        };
        window.closeModal = () => document.getElementById('recipeModal').classList.add('hidden');

        document.getElementById('recipeForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                title: document.getElementById('recipeTitle').value,
                labels: document.getElementById('recipeLabels').value.split(',').map(s=>s.trim()).filter(s=>s),
                ingredients: document.getElementById('recipeIngredients').value,
                instructions: document.getElementById('recipeInstructions').value,
                image: currentImageData
            };
            if(db && user) {
                const path = `artifacts/${baseAppId}/public/data/recipes_${currentSyncKey}`;
                if(id) await updateDoc(doc(db, path, id), data); 
                else await addDoc(collection(db, path), data);
            } else {
                if(id) recipes[recipes.findIndex(x=>x.id==id)] = {...data, id};
                else recipes.push({...data, id: Date.now().toString()});
                saveToLocal(); renderRecipes();
            }
            window.closeModal();
        };

        // --- WOCHENPLAN ---
        window.renderPlan = () => {
            const grid = document.getElementById('planGrid'); grid.innerHTML = '';
            ["Mo","Di","Mi","Do","Fr","Sa","So"].forEach(day => {
                const entry = weekPlan[day];
                const card = document.createElement('div');
                card.className = 'day-card p-5 rounded-2xl paper-texture shadow-sm border-l-4 border-[#8b5a2b] flex flex-col h-full relative';
                const deleteBtn = entry ? `<button onclick="window.deletePlanEntry('${day}')" class="absolute top-4 right-4 text-red-700/30 hover:text-red-700 p-1"><i class="fas fa-trash"></i></button>` : '';
                card.innerHTML = `
                    <h3 class="font-bold border-b border-dashed border-[#d2b48c] mb-2 text-[#8b5a2b]">${day}</h3>
                    ${deleteBtn}
                    <div class="text-sm italic min-h-[50px] flex items-center mb-4 pr-6">
                        ${entry ? entry.name : 'Noch nichts geplant...'}
                    </div>
                    <button onclick="window.openPlanModal('${day}')" class="w-full mt-auto py-2 bg-[#eaddca] text-[#8b5a2b] rounded-xl text-xs font-bold uppercase">
                        ${entry ? 'Ändern' : 'Planen'}
                    </button>
                `;
                grid.appendChild(card);
            });
        };

        window.deletePlanEntry = async (day) => {
            weekPlan[day] = null;
            if (db && user) {
                await setDoc(doc(db, 'artifacts', baseAppId, 'public', 'data', 'plans', currentSyncKey), weekPlan);
            } else {
                saveToLocal(); renderPlan();
            }
        };

        window.openPlanModal = (day) => {
            currentPlanDay = day;
            document.getElementById('planModalTitle').innerText = `${day} planen`;
            document.getElementById('planSearchInput').value = "";
            window.filterPlanList();
            document.getElementById('planModal').classList.remove('hidden');
        };
        window.closePlanModal = () => document.getElementById('planModal').classList.add('hidden');
        
        window.filterPlanList = () => {
            const rList = document.getElementById('planRecipeList');
            const fList = document.getElementById('planFreezerList');
            const term = document.getElementById('planSearchInput').value.toLowerCase();

            if (term === "") {
                rList.innerHTML = `<p class="text-[10px] italic p-3 opacity-40">Tippe zum Suchen in Rezepten...</p>`;
            } else {
                const filtered = recipes.filter(r => r.title.toLowerCase().includes(term));
                rList.innerHTML = filtered.map(r => `<button onclick="window.selectPlanItem('${r.title}', 'recipe', '${r.id}')" class="w-full text-left p-3 hover:bg-[#f4ece1] rounded-xl text-sm border-b border-gray-100 flex items-center gap-2"><i class="fas fa-utensils opacity-30 text-xs"></i> ${r.title}</button>`).join('');
            }

            const freez = freezer.filter(f => f.portions > 0 && f.name.toLowerCase().includes(term));
            fList.innerHTML = `<h4 class="text-[10px] uppercase font-bold text-[#8b5a2b] mt-4 mb-2">Aus dem Frost</h4>` + (freez.length ? freez.map(f => `<button onclick="window.selectPlanItem('${f.name}', 'freezer', '${f.id}')" class="w-full text-left p-3 hover:bg-[#f4ece1] rounded-xl text-sm border-b border-gray-100 flex justify-between items-center"><span class="flex items-center gap-2"><i class="fas fa-snowflake text-blue-400 opacity-60"></i> ${f.name}</span><span class="text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full">${f.portions} P.</span></button>`).join('') : '<p class="text-[10px] italic p-3 opacity-40">Nichts Passendes vorrätig...</p>');
        };

        window.selectPlanItem = async (name, type, id) => {
            weekPlan[currentPlanDay] = { name, type, id };
            try {
                if (db && user) {
                    await setDoc(doc(db, 'artifacts', baseAppId, 'public', 'data', 'plans', currentSyncKey), weekPlan);
                    if (type === 'freezer') {
                        const item = freezer.find(f => f.id === id);
                        if (item && item.portions > 0) {
                            await updateDoc(doc(db, 'artifacts', baseAppId, 'public', 'data', 'freezer_' + currentSyncKey, id), { portions: item.portions - 1 });
                        }
                    }
                } else {
                    if (type === 'freezer') {
                        const item = freezer.find(f => f.id === id);
                        if (item && item.portions > 0) item.portions -= 1;
                    }
                    saveToLocal(); renderPlan(); renderFreezer();
                }
                window.closePlanModal();
            } catch (err) { console.error("Plan Error:", err); }
        };

        window.savePlanEntry = async () => {
            const t = document.getElementById('planCustomText').value;
            if(t) { 
                weekPlan[currentPlanDay] = { name: t, type: 'custom' }; 
                if (db && user) await setDoc(doc(db, 'artifacts', baseAppId, 'public', 'data', 'plans', currentSyncKey), weekPlan); 
                else { saveToLocal(); renderPlan(); }
                window.closePlanModal(); 
            }
        };

        // --- TIEFKÜHLER ---
        window.renderFreezer = () => {
            const list = document.getElementById('freezerList'); 
            list.innerHTML = freezer.length ? '' : '<p class="text-center italic text-xs py-4 opacity-30">Keine Vorräte vorhanden...</p>';
            freezer.forEach(i => {
                list.innerHTML += `<div class="flex justify-between items-center p-4 bg-white/70 rounded-2xl border border-dashed border-[#d2b48c] group transition-all"><div class="text-sm"><b>${i.name}</b><br><span class="text-[10px] text-[#8b5a2b] uppercase font-bold">${i.portions} Portionen</span></div><div class="flex gap-2 items-center"><button onclick="window.changePortion('${i.id}',-1)" class="w-8 h-8 border-2 border-[#d2b48c] rounded-full flex items-center justify-center font-bold">-</button><button onclick="window.changePortion('${i.id}',1)" class="w-8 h-8 border-2 border-[#d2b48c] rounded-full flex items-center justify-center font-bold">+</button><button onclick="window.deleteFreezerItem('${i.id}', '${i.name}')" class="ml-2 text-red-700 p-2"><i class="fas fa-trash-alt"></i></button></div></div>`;
            });
        };

        window.changePortion = async (id, diff) => {
            const i = freezer.find(x => x.id == id);
            if(!i) return;
            const newVal = Math.max(0, i.portions + diff);
            if (db && user) await updateDoc(doc(db, 'artifacts', baseAppId, 'public', 'data', 'freezer_' + currentSyncKey, id), { portions: newVal }); 
            else { i.portions = newVal; saveToLocal(); renderFreezer(); }
        };

        window.deleteFreezerItem = (id, name) => {
            window.showConfirm(`"${name}" aus dem Tiefkühler entfernen?`, async () => {
                if (db && user) await deleteDoc(doc(db, 'artifacts', baseAppId, 'public', 'data', 'freezer_' + currentSyncKey, id));
                else { freezer = freezer.filter(x => x.id !== id); saveToLocal(); renderFreezer(); }
            });
        };

        window.saveFreezerItem = async () => {
            const n = document.getElementById('freezerItemName').value, p = parseInt(document.getElementById('freezerItemPortions').value);
            if(n) {
                if(db && user) await addDoc(collection(db, 'artifacts', baseAppId, 'public', 'data', 'freezer_' + currentSyncKey), { name: n, portions: p }); 
                else { freezer.push({id: Date.now().toString(), name: n, portions: p}); saveToLocal(); renderFreezer(); }
                document.getElementById('freezerModal').classList.add('hidden');
            }
        };

        window.freezeCurrentRecipe = async () => {
            if (!currentRecipeInView) return;
            const port = prompt(`Wie viele Portionen von "${currentRecipeInView.title}" einfrieren?`, "2");
            if (port && !isNaN(port)) {
                if (db && user) await addDoc(collection(db, 'artifacts', baseAppId, 'public', 'data', 'freezer_' + currentSyncKey), { name: currentRecipeInView.title, portions: parseInt(port) });
                else { freezer.push({id: Date.now().toString(), name: currentRecipeInView.title, portions: parseInt(port)}); saveToLocal(); renderFreezer(); }
            }
        };

        // --- UI UTILS ---
        window.showConfirm = (msg, action) => { document.getElementById('confirmMessage').innerText = msg; confirmAction = action; document.getElementById('confirmModal').classList.remove('hidden'); };
        window.closeConfirm = () => { document.getElementById('confirmModal').classList.add('hidden'); confirmAction = null; };
        document.getElementById('confirmYesBtn').onclick = () => { if(confirmAction) confirmAction(); window.closeConfirm(); };
        window.openFreezerModal = () => document.getElementById('freezerModal').classList.remove('hidden');
        window.switchTab('recipes');

        const lastKeyLS = localStorage.getItem('lastSyncKey');
        if(lastKeyLS) {
            try {
                // Check if it's base64 (for backward compatibility)
                const decoded = atob(lastKeyLS);
                document.getElementById('syncKeyInput').value = decoded;
            } catch(e) {
                document.getElementById('syncKeyInput').value = lastKeyLS;
            }
        }

        document.getElementById('recipeImageInput').addEventListener('change', (e) => {
            const f = e.target.files[0];
            if(f) { const r = new FileReader(); r.onload = (ev) => currentImageData = ev.target.result; r.readAsDataURL(f); }
        });
    </script>
</body>
</html>
